<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Company Home Page</title>
</head>
<body>
  <h2>Company Home Page - Ohh</h2>
  <hr>
  <p>
      Welcome to the company home page! Yeah
  </p>
  <hr>
  <!-- Display username and role -->
  <p>
      User: <span sec:authentication="principal.username"></span>
      <br><br>
      Role(s): <span sec:authentication="principal.authorities"></span>
  </p>

  <div sec:authorize="hasRole('MANAGER')">
      <!-- Add a link to point to /leaders. This is for the managers role -->
      <p>
          <a th:href="@{/leaders}">Leadership Meeting</a>
          (Only for Manager peeps)
      </p>
  </div>

  <div sec:authorize="hasRole('ADMIN')">
      <!-- Add a link to point to /systems. This is for the admins role -->
      <p>
          <a th:href="@{/systems}">IT Systems Meeting</a>
          (Only for Admin peeps)
      </p>
  </div>
  <hr>
  <!-- Logout Button -->
  <form action="#" th:action="@{/logout}" method="post">
      <input type="submit" value="Logout" />
  </form>

</body>
</html>
